<!DOCTYPE html>
<html><head><title>Risco Control Panel</title>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0e1a;color:#c8d0e0;font-size:15px;padding:20px;max-width:1400px;margin:0 auto}
  h1{color:#38bdf8;font-size:24px;margin-bottom:4px}
  h1 small{color:#475569;font-size:14px;font-weight:400;margin-left:8px}
  .sec-hdr{color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:1px;padding:14px 0 8px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;border-bottom:1px solid #1e293b}
  .sec-hdr:hover{color:#94a3b8}
  .sec-hdr .arr{font-size:10px;transition:transform .2s}
  .sec-hdr .arr.open{transform:rotate(90deg)}
  .sec-body{overflow:hidden}.sec-body.closed{display:none}
  .g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;padding:10px 0}
  .c{background:#131a2b;border-radius:6px;padding:12px 14px;border:1px solid #1e293b}
  .c.bad{border-color:#dc2626}.c.good{border-color:#16a34a}
  .audit-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;padding:10px 0}
  .audit-card{background:#131a2b;border:1px solid #1e293b;border-radius:6px;padding:12px 14px}
  .audit-num{font-size:24px;font-weight:800;color:#e2e8f0;line-height:1}
  .audit-list{display:grid;gap:8px;padding:4px 0 10px}
  .audit-item{display:grid;grid-template-columns:92px minmax(0,1fr);gap:10px;align-items:start;background:#101827;border:1px solid #1e293b;border-radius:6px;padding:10px 12px}
  .audit-item.critical,.audit-item.issue{border-color:#7f1d1d}.audit-item.warning{border-color:#713f12}.audit-item.info{border-color:#1e3a8a}
  .audit-title{font-weight:700;color:#e2e8f0}.audit-detail{color:#94a3b8;font-size:13px;margin-top:2px}.audit-action{color:#c8d0e0;font-size:13px;margin-top:6px}.audit-refs{color:#64748b;font-size:12px;margin-top:4px;font-family:monospace}
  .name{font-size:16px;font-weight:600;color:#e2e8f0}
  .dim{color:#64748b;font-size:13px;margin-top:2px}
  .row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
  .t{display:inline-block;padding:2px 8px;border-radius:3px;font-size:12px;font-weight:600;margin-right:3px}
  .t-ok{background:#0f3d1f;color:#6ee7a0}.t-warn{background:#422006;color:#fbbf24}
  .t-err{background:#450a0a;color:#f87171}.t-info{background:#0c2d4d;color:#60a5fa}.t-dim{background:#1e293b;color:#64748b}
  .bars{display:inline-flex;align-items:flex-end;gap:1px;margin-right:4px;vertical-align:middle}
  .bar{width:3px;border-radius:1px}.bar.on{background:#22c55e}.bar.off{background:#1e293b}
  button{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px}
  button:active{opacity:.7}
  .br{background:#dc2626;color:#fff}.bg{background:#16a34a;color:#fff}.by{background:#ca8a04;color:#fff}
  .bb{background:#2563eb;color:#fff}.bp{background:#6d28d9;color:#fff}.bgr{background:#475569;color:#fff}
  select,input[type=text],input[type=number],input[type=password]{background:#1e293b;color:#c8d0e0;border:1px solid #334155;border-radius:4px;padding:5px 8px;font-size:14px}
  input[type=text]{width:180px}input[type=number]{width:80px}input[type=password]{width:140px}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:4px 10px;font-size:14px}
  .kv .k{color:#475569}.kv .v{color:#c8d0e0}
  /* Tables */
  table{width:100%;border-collapse:collapse;margin:6px 0}
  td{padding:7px 10px;border-bottom:1px solid #1a2236;vertical-align:middle;font-size:14px}
  tr:hover{background:#131a2b}
  .tid{color:#64748b;width:32px;text-align:right;font-size:13px}
  .tname{font-weight:600;color:#e2e8f0;max-width:200px;font-size:15px}
  .tinfo{color:#64748b;font-size:13px}
  /* Edit panel */
  .edit-panel{background:#0f1629;border:1px solid #1e3a5f;border-radius:6px;padding:14px;margin:8px 0}
  .edit-panel label{display:inline-block;color:#64748b;font-size:13px;width:140px;text-align:right;margin-right:8px}
  .edit-row{margin:6px 0;display:flex;align-items:center;flex-wrap:wrap;gap:6px}
  .edit-panel .edit-title{color:#38bdf8;font-size:14px;font-weight:600;margin-bottom:10px}
  .cb{display:inline-flex;align-items:center;gap:5px;margin-right:14px;font-size:13px;color:#94a3b8}
  .cb input[type=checkbox]{accent-color:#2563eb}
  /* Raw */
  .raw-row{display:flex;gap:6px;padding:8px 0}
  .raw-row input{flex:1;padding:8px 10px;background:#131a2b;color:#e2e8f0;border:1px solid #1e293b;border-radius:4px;font-family:monospace;font-size:14px}
  .cmd-tools{display:grid;grid-template-columns:minmax(220px,1fr) 150px 130px 120px;gap:8px;padding:10px 0;align-items:center}
  .cmd-tools input{width:100%;font-family:monospace}
  .cmd-tools select{width:100%}
  .cmd-stats{color:#64748b;font-size:13px;margin:0 0 8px}
  .cmd-menu{display:grid;grid-template-columns:210px 260px minmax(0,1fr);gap:10px;min-height:430px}
  .cmd-pane{border:1px solid #1e293b;border-radius:6px;overflow:auto;max-height:430px;background:#0d1424}
  .cmd-tab{display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid #1a2236;cursor:pointer;align-items:center}
  .cmd-tab:hover,.cmd-tab.sel{background:#131a2b}
  .cmd-tab .cmd-count{color:#64748b;font-size:12px;white-space:nowrap}
  .cmd-detail{border:1px solid #1e293b;border-radius:6px;background:#0d1424;min-width:0;max-height:430px;overflow:auto}
  .cmd-detail-head{padding:10px;border-bottom:1px solid #1a2236}
  .cmd-detail-title{font-family:monospace;color:#e2e8f0;font-weight:700;font-size:16px}
  .cmd-list{overflow:hidden}
  .cmd-row{display:grid;grid-template-columns:150px 120px 1fr 170px;gap:10px;align-items:center;padding:7px 10px;border-bottom:1px solid #1a2236}
  .cmd-row:last-child{border-bottom:none}
  .cmd-name{font-family:monospace;color:#e2e8f0;font-weight:700}
  .cmd-meta{color:#64748b;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cmd-actions{display:flex;gap:6px;justify-content:flex-end}
  @media(max-width:900px){.cmd-tools{grid-template-columns:1fr 1fr}.cmd-menu{grid-template-columns:1fr}.cmd-pane,.cmd-detail{max-height:300px}.cmd-row{grid-template-columns:1fr}.cmd-actions{justify-content:flex-start}.audit-item{grid-template-columns:1fr}}
  pre{padding:8px;background:#0a0e1a;border:1px solid #1e293b;border-radius:4px;font-size:13px;color:#38bdf8;max-height:150px;overflow:auto;margin-top:4px}
  .loader{color:#475569;font-size:14px;padding:6px 0}
  .toast{position:fixed;top:16px;right:16px;background:#16a34a;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;z-index:999;display:none}
  .toast.err{background:#dc2626}
</style></head><body>

<div style="display:flex;justify-content:space-between;align-items:center">
<h1>Risco LightSYS<small id="clock"></small></h1>
<div style="display:flex;gap:6px;align-items:center">
  <button class="bgr" onclick="showSettings()" style="font-size:13px;padding:5px 10px" title="Panel Settings">Settings</button>
  <button class="bgr" onclick="localStorage.removeItem('risco-server');location.reload()" style="font-size:11px">Disconnect</button>
</div>
</div>
<div class="toast" id="toast"></div>

<div id="settings-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center">
  <div class="c" style="max-width:460px;width:90%;padding:24px">
    <div class="name" style="margin-bottom:4px;font-size:18px">Panel Connection Settings</div>
    <div class="dim" style="margin-bottom:16px">Configure your Risco alarm panel connection</div>
    <div class="edit-row"><label style="width:120px;display:inline-block;color:#64748b;font-size:13px;text-align:right;margin-right:8px">Panel IP</label><input type="text" id="cfg-ip" placeholder="192.168.1.100" style="width:200px"></div>
    <div class="edit-row"><label style="width:120px;display:inline-block;color:#64748b;font-size:13px;text-align:right;margin-right:8px">Port</label><input type="number" id="cfg-port" placeholder="1000" style="width:100px"></div>
    <div class="edit-row"><label style="width:120px;display:inline-block;color:#64748b;font-size:13px;text-align:right;margin-right:8px">Password</label><input type="password" id="cfg-pass" placeholder="5678" style="width:140px"></div>
    <div class="edit-row"><label style="width:120px;display:inline-block;color:#64748b;font-size:13px;text-align:right;margin-right:8px">Panel ID</label><input type="text" id="cfg-id" placeholder="0001" style="width:100px"></div>
    <div class="edit-row"><label style="width:120px;display:inline-block;color:#64748b;font-size:13px;text-align:right;margin-right:8px">Panel Type</label><select id="cfg-type"></select></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="bgr" onclick="hideSettings()">Cancel</button>
      <button class="bg" onclick="saveSettings()" id="cfg-save-btn">Save &amp; Reconnect</button>
    </div>
    <div id="cfg-status" style="margin-top:8px;font-size:12px"></div>
  </div>
</div>

<div id="connect" style="display:none">
  <div class="c" style="max-width:500px;margin:40px auto;text-align:center">
    <div class="name" style="margin-bottom:12px">Connect to your local Risco server</div>
    <div class="dim" style="margin-bottom:12px">Run <code style="background:#1e293b;padding:2px 6px;border-radius:3px">npm start</code> on your local machine, then enter the address below</div>
    <div class="row" style="justify-content:center">
      <input type="text" id="server-url" placeholder="http://192.168.x.x:3580" style="width:260px;padding:8px;font-size:14px">
      <button class="bg" onclick="connectServer()" style="padding:8px 20px;font-size:14px">Connect</button>
    </div>
    <div id="connect-err" style="color:#f87171;margin-top:8px;font-size:12px"></div>
  </div>
</div>

<div id="sys"></div>
<div id="audit"></div>
<div id="parts"></div>
<div id="zones"></div>
<div id="outs"></div>
<div id="users"></div>
<div id="keypads"></div>
<div id="keyfobs"></div>
<div id="sirens"></div>
<div id="followme"></div>
<div id="monitoring"></div>
<div id="cloud"></div>
<div id="gsm-sec"></div>
<div id="network"></div>
<div id="arming"></div>
<div id="schedules"></div>
<div id="vacations"></div>
<div id="events"></div>
<div id="firmware"></div>
<div id="actions"></div>
<div id="cmdcatalog"></div>
<div id="raw"></div>

<script>
const $ = s => document.querySelector(s);

// Server URL: auto-detect if served locally, otherwise ask user
let BASE = '';
function getBase() {
  // If served from the local server itself, use relative URLs
  if (location.port === '3580' || location.hostname === 'localhost') return '';
  // Check localStorage for saved server URL
  const saved = localStorage.getItem('risco-server');
  if (saved) return saved;
  return null;
}

async function connectServer() {
  let url = $('#server-url').value.trim().replace(/\/+$/, '');
  if (!url.startsWith('http')) url = 'http://' + url;
  try {
    const r = await fetch(url + '/api/system');
    const d = await r.json();
    if (d.panel) {
      localStorage.setItem('risco-server', url);
      BASE = url;
      $('#connect').style.display = 'none';
      load();
    } else {
      $('#connect-err').textContent = 'Connected but panel not ready. Is the server running?';
    }
  } catch(e) {
    $('#connect-err').textContent = 'Cannot reach ' + url + ' — check the address and make sure server is running';
  }
}

const api = async p => (await fetch(BASE+'/api/'+p)).json();
const post = async (p,b) => (await fetch(BASE+'/api/'+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})})).json();
const put = async (p,b) => (await fetch(BASE+'/api/'+p,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json();

function toast(msg, err){const t=$('#toast');t.textContent=msg;t.className='toast'+(err?' err':'');t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
function tag(t,c){return `<span class="t t-${c}">${t}</span>`}
function bars(val,max,n=5){if(!val||val<=0)return'';let h='<span class="bars">';for(let i=0;i<n;i++){h+=`<span class="bar ${val>(max/n)*(i+1)?'on':'off'}" style="height:${4+i*3}px"></span>`}return h+'</span>'}
function parseDate(s){if(!s)return null;const m=s.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);return m?new Date(m[3],m[2]-1,m[1],m[4],m[5]):null}
function timeAgo(s){const d=parseDate(s);if(!d)return'';const diff=Date.now()-d.getTime();if(diff<0)return'';const m=Math.floor(diff/60000);if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';const dy=Math.floor(h/24);if(dy<30)return dy+'d';const mo=Math.floor(dy/30);if(mo<12)return mo+'mo';return Math.floor(mo/12)+'y'}
function sec(id,title,body,open=true){$(id).innerHTML=`<div class="sec-hdr" onclick="this.querySelector('.arr').classList.toggle('open');this.nextElementSibling.classList.toggle('closed')"><span class="arr ${open?'open':''}">\u25B6</span>${title}</div><div class="sec-body${open?'':' closed'}">${body}</div>`}
function kv(p){return '<div class="kv">'+p.map(([k,v])=>`<span class="k">${k}</span><span class="v">${v}</span>`).join('')+'</div>'}
function inp(id,val,type='text',w){return `<input type="${type}" id="${id}" value="${val||''}"${w?' style="width:'+w+'"':''}>`}
function sel(id,opts,cur){return `<select id="${id}">${opts.map(([v,l])=>`<option value="${v}"${v==cur?' selected':''}>${l}</option>`).join('')}</select>`}
function cb(id,label,checked){return `<label class="cb"><input type="checkbox" id="${id}"${checked?' checked':''}>${label}</label>`}
function editBtn(onclick){return ` <button class="bgr" onclick="${onclick}">Edit</button>`}
function saveBtn(onclick){return `<button class="bg" onclick="${onclick}">Save</button> `}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function sevTag(sev){const c=sev==='critical'||sev==='issue'?'err':sev==='warning'?'warn':sev==='info'?'info':'ok';return tag((sev||'ok').toUpperCase(),c)}

async function loadAudit(){
  $('#audit').innerHTML='<div class="loader">Running audit...</div>';
  try {
    const audit = await api('audit');
    renderAudit(audit);
  } catch(e) {
    sec('#audit','Audit',`<div class="c dim">Audit unavailable: ${esc(e.message)}</div>`);
  }
}

function renderAudit(audit){
  if(!audit || audit.error){
    sec('#audit','Audit',`<div class="c dim">${esc(audit&&audit.error?audit.error:'Audit unavailable')}</div>`);
    return;
  }
  const s=audit.summary||{};
  const counts=s.counts||{};
  const findings=audit.findings||[];
  const open=findings.filter(f=>f.severity!=='info');
  const watch=findings.filter(f=>f.severity==='info');
  const rows=findings.map(f=>{
    const refs=(f.refs||[]).slice(0,8).join(' ');
    return `<div class="audit-item ${esc(f.severity)}">`+
      `<div>${sevTag(f.severity)}</div>`+
      `<div><div class="audit-title">${esc(f.title)}</div>`+
      `<div class="audit-detail">${esc(f.category)} / ${esc(f.code)} - ${esc(f.detail)}</div>`+
      `<div class="audit-action">${esc(f.action)}</div>`+
      (refs?`<div class="audit-refs">${esc(refs)}</div>`:'')+
      `</div></div>`;
  }).join('') || '<div class="c good"><div class="name">No open issues</div><div class="dim">Current audit found no active findings.</div></div>';
  const body=`<div class="audit-top">`+
    `<div class="audit-card"><div class="audit-num">${s.openCount||0}</div><div class="dim">open issues</div></div>`+
    `<div class="audit-card"><div class="audit-num">${watch.length}</div><div class="dim">watch items</div></div>`+
    `<div class="audit-card"><div class="row">${tag('CRIT '+(counts.critical||0),'err')}${tag('ISSUE '+(counts.issue||0),'err')}${tag('WARN '+(counts.warning||0),'warn')}${tag('INFO '+(counts.info||0),'info')}</div><div class="dim">Generated ${esc(audit.generatedAt||'')}</div></div>`+
    `<div class="audit-card"><div class="name">${esc((audit.panel&&audit.panel.model)||'Panel')}</div><div class="dim">${esc((audit.panel&&audit.panel.version)||'')}</div></div>`+
    `</div><div class="audit-list">${rows}</div>`;
  sec('#audit',`Audit (${open.length} open${watch.length?`, ${watch.length} watch`:''})`,body,true);
}

async function doAction(p){const r=await post(p);toast(r.success?'Done':'Failed: '+JSON.stringify(r),!r.success);setTimeout(()=>location.reload(),500)}
async function doSens(id,v){const r=await post('zones/'+id+'/sensitivity',{pirSensitivity:v});toast(r.success?'Saved':'Failed',!r.success)}

async function savePut(endpoint, fields) {
  const body = {};
  fields.forEach(([key, elId, type]) => {
    const el = document.getElementById(elId);
    if (!el) return;
    if (type === 'secret' && !el.value) return;
    if (type === 'bool') body[key] = el.checked;
    else if (type === 'int') body[key] = parseInt(el.value) || 0;
    else body[key] = el.value;
  });
  const r = await put(endpoint, body);
  toast(r.success ? 'Saved' : 'Failed: ' + JSON.stringify(r), !r.success);
}

async function load(){
  // ========== SYSTEM ==========
  $('#sys').innerHTML='<div class="loader">Connecting to panel...</div>';
  let sys;
  for (let attempt = 0; attempt < 10; attempt++) {
    sys = await api('system');
    if (sys.panel && sys.panel.model) break;
    $('#sys').innerHTML=`<div class="loader">Waiting for panel... (${attempt+1}/10)</div>`;
    await new Promise(r => setTimeout(r, 3000));
  }
  if (!sys.panel || !sys.panel.model) { $('#sys').innerHTML='<div class="loader" style="color:#f87171">Panel not ready — check <a href="#" onclick="showSettings();return false" style="color:#38bdf8">Settings</a> to configure the panel IP address.</div>'; return; }
  $('#clock').textContent = ' - ' + sys.panel.clock;
  sec('#sys','System','<div class="g3">'+
    `<div class="c"><div class="name">${sys.panel.model}</div><div class="dim">${sys.panel.version}</div>`+
    `<div class="dim">S/N: ${sys.panel.serial} | Bat: ${sys.battery.voltage}</div>`+
    `<div class="dim">Lang: ${sys.panel.language} | Label: ${sys.panel.label}</div>`+
    editBtn(`toggleEl('sys-edit')`)+
    `<div id="sys-edit" class="edit-panel" style="display:none"><div class="edit-title">Edit System</div>`+
    `<div class="edit-row"><label>Label</label>${inp('se-lbl',sys.panel.label)}</div>`+
    `<div class="edit-row"><label>Timezone</label>${inp('se-tz','','number','60px')}</div>`+
    `<div class="edit-row"><label>Language</label>${inp('se-lang',sys.panel.language,'text','60px')}</div>`+
    `<div class="edit-row">${saveBtn("savePut('system',[['label','se-lbl'],['timezone','se-tz','int'],['language','se-lang']])")}</div>`+
    `</div></div>`+
    `<div class="c"><div class="name">IP Module</div><div class="dim">${sys.ip.address} | ${sys.ip.mac}</div></div>`+
    `<div class="c"><div class="name">GSM</div><div class="dim">${sys.gsm.imei}</div></div>`+
  '</div>');
  loadAudit();

  // ========== PARTITIONS ==========
  const parts = await api('partitions');
  let ph='<div class="g3">';
  parts.forEach(p=>{
    if(!p.status.exist)return;
    const a=p.status.armed,s=p.status.homeStay;
    ph+=`<div class="c ${a?'bad':'good'}"><div style="display:flex;justify-content:space-between;align-items:center">`;
    ph+=`<div><div class="name">${p.label}</div><div class="row">`;
    ph+=a?tag('ARMED'+(s?' HOME':' AWAY'),'err'):tag('DISARMED','ok');
    if(p.status.ready)ph+=tag('READY','ok');if(p.status.alarm)ph+=tag('ALARM!','err');if(p.status.trouble)ph+=tag('TROUBLE','warn');
    ph+=`</div></div><div style="display:flex;gap:4px">`;
    ph+=`<button class="br" onclick="doAction('partitions/${p.id}/arm')">ARM</button>`;
    ph+=`<button class="by" onclick="doAction('partitions/${p.id}/arm-stay')">STAY</button>`;
    ph+=`<button class="bg" onclick="doAction('partitions/${p.id}/disarm')">DISARM</button>`;
    ph+=`</div></div></div>`;
  });
  sec('#parts','Partitions',ph+'</div>');

  // ========== ZONES ==========
  $('#zones').innerHTML='<div class="loader">Loading zones...</div>';
  const zones = await api('zones');
  let zh='<table>';
  zones.forEach(z=>{
    const st=z.status||{};const bad=st.lowBattery||st.tamper||st.trouble||st.lost;
    const dead=z.tech==='W'&&z.rssi===0;
    const ci=z.lastCheckIn&&z.lastCheckIn!=='00/00/0000 00:00'?z.lastCheckIn:null;
    zh+=`<tr${bad?' style="background:#1a0a0a"':''}>`;
    zh+=`<td class="tid">${z.id}</td><td class="tname">${z.label}</td>`;
    zh+=`<td class="tinfo">${z.tech==='W'?(dead?'':bars(z.rssi,80)):''}${z.tech} ${z.rssi?'('+z.rssi+')':''}`;
    zh+=dead?` ${tag('DEAD','err')} <span class="dim">since ${timeAgo(z.lastTrigger)||'never'}</span>`:(ci?` <span class="dim">${timeAgo(ci)}</span>`:'');
    zh+=`</td><td>`;
    zh+=st.open?tag('OPEN','warn'):tag('CLOSED','ok');
    zh+=st.lowBattery?tag('LOW BAT','err'):tag('OK','ok');
    if(st.tamper)zh+=tag('TAMPER','err');if(st.trouble)zh+=tag('TROUBLE','warn');if(st.bypass)zh+=tag('BYPASS','info');if(st.lost)zh+=tag('LOST','err');
    zh+=`</td><td>`;
    if(z.wireless){
      zh+=`<span class="dim">PIR:</span><select onchange="doSens(${z.id},+this.value)" style="width:40px">`;
      for(let v=1;v<=3;v++)zh+=`<option${v===z.wireless.pirSensitivity?' selected':''}>${v}</option>`;
      zh+=`</select> <span class="dim">MW:${z.wireless.microwaveSensitivity}</span> `;
    }
    zh+=`<button class="bp" onclick="doAction('zones/${z.id}/bypass')">BYPASS</button>`;
    zh+=` <button class="bgr" onclick="toggleEl('ze-${z.id}')">...</button>`;
    zh+=`</td></tr>`;
    // Edit row
    zh+=`<tr id="ze-${z.id}" style="display:none"><td colspan="5"><div class="edit-panel"><div class="edit-title">Zone ${z.id} Config</div>`;
    zh+=`<div class="edit-row"><label>Label</label>${inp('zl-'+z.id,z.label)}</div>`;
    if(z.wireless){
      zh+=`<div class="edit-row"><label>PIR Sensitivity (1-3)</label><input type="number" id="zp-${z.id}" value="${z.wireless.pirSensitivity}" min="1" max="3" style="width:50px"> <label>MW Sensitivity (1-3)</label><input type="number" id="zm-${z.id}" value="${z.wireless.microwaveSensitivity}" min="1" max="3" style="width:50px"></div>`;
      zh+=`<div class="edit-row"><label>Pulse Count</label>${inp('zpc-'+z.id,z.wireless.pulseCount,'number','50px')} <label>LED</label>${sel('zled-'+z.id,[['0','Off'],['1','On']],z.wireless.ledEnabled)}</div>`;
    }

    zh+=`</div></td></tr>`;

  sec('#zones',`Zones (${zones.length})`,zh+'</table>');

  // ========== OUTPUTS ==========
  const outs = await api('outputs');
  let oh='<table>';

    oh+=`<tr><td class="tid">${o.id}</td><td class="tname">${o.label}</td>`;

    oh+=` <button class="bgr" onclick="toggleEl('oe-${o.id}')">...</button></td></tr>`;
    oh+=`<tr id="oe-${o.id}" style="display:none"><td colspan="4"><div class="edit-panel"><div class="edit-title">Output ${o.id}</div>`;
    oh+=`<div class="edit-row"><label>Label</label>${inp('ol-'+o.id,o.label)} <label>Type</label>${inp('ot-'+o.id,o.type,'number','50px')} <label>Pulse</label>${inp('op-'+o.id,o.pulse,'number','50px')}s</div>`;
    oh+=`<div class="edit-row">${saveBtn(`savePut('outputs/${o.id}',[['label','ol-${o.id}'],['type','ot-${o.id}','int'],['pulse','op-${o.id}','int']])`)}</div>`;
    oh+=`</div></td></tr>`;

  sec('#outs','Outputs',oh+'</table>');

  // ========== USERS ==========
  const users = await api('users');
  let uh='<table>';
  users.forEach(u=>{
    const pinTag = u.pinInfo&&u.pinInfo.weak ? tag('WEAK PIN','err') : (u.pinInfo&&u.pinInfo.present ? tag('PIN SET','dim') : tag('NO PIN','warn'));

    uh+=`<td><button class="bgr" onclick="toggleEl('ue-${u.id}')">Edit</button></td></tr>`;
    uh+=`<tr id="ue-${u.id}" style="display:none"><td colspan="5"><div class="edit-panel"><div class="edit-title">User ${u.id}</div>`;
    uh+=`<div class="edit-row"><label>Label</label>${inp('ul-'+u.id,u.label)} <label>Level</label>${inp('ulv-'+u.id,u.level,'number','60px')} <label>PIN</label>${inp('up-'+u.id,'','password','80px')}</div>`;
    uh+=`<div class="edit-row">${saveBtn(`savePut('users/${u.id}',[['label','ul-${u.id}'],['level','ulv-${u.id}','int'],['pin','up-${u.id}','secret']])`)}</div>`;
    uh+=`</div></td></tr>`;

  sec('#users','Users',uh+'</table>');

  // ========== KEYPADS ==========
  const kps = await api('keypads');
  let kh='<table>';
  kps.forEach(k=>{
    kh+=`<tr><td class="tid">${k.id}</td><td class="tname">${k.label}</td><td class="dim">RSSI:${k.rssi} Func:${k.function}</td>`;
    kh+=`<td><button class="bgr" onclick="toggleEl('ke-${k.id}')">Edit</button></td></tr>`;
    kh+=`<tr id="ke-${k.id}" style="display:none"><td colspan="4"><div class="edit-panel">`;

    kh+=`<div class="edit-row">${saveBtn(`savePut('keypads/${k.id}',[['label','kl-${k.id}'],['function','kf-${k.id}','int']])`)}</div>`;
    kh+=`</div></td></tr>`;
  });
  sec('#keypads','Keypads',kh+'</table>',false);

  // ========== KEYFOBS ==========
  const fobs = await api('keyfobs');
  let fh='<table>';
  fobs.forEach(f=>{
    fh+=`<tr><td class="tid">${f.id}</td><td class="tname">${f.label}</td><td class="dim">RSSI:${f.rssi} B1:${f.button1Type} B2:${f.button2Type}</td>`;

    fh+=`</div></td></tr>`;

  sec('#keyfobs','Keyfobs',fh+'</table>',false);

  // ========== SIRENS ==========
  const sirens = await api('sirens');
  let ssh='<table>';
  sirens.forEach(s=>{
    ssh+=`<tr><td class="tid">${s.id}</td><td class="dim">Type:${s.type} RSSI:${s.rssi} Alarm:${s.soundAlarm} Squawk:${s.soundSquawk} Strobe:${s.strobe}</td>`;

    ssh+=`<tr id="se-${s.id}" style="display:none"><td colspan="3"><div class="edit-panel">`;
    ssh+=`<div class="edit-row"><label>Type</label>${inp('st-'+s.id,s.type,'number','50px')} <label>Sound Alarm</label>${sel('ssa-'+s.id,[['0','Off'],['1','On']],s.soundAlarm)} <label>Squawk</label>${sel('ssq-'+s.id,[['0','Off'],['1','On']],s.soundSquawk)}</div>`;
    ssh+=`<div class="edit-row"><label>Strobe</label>${sel('sst-'+s.id,[['0','Off'],['1','On']],s.strobe)} <label>Strobe Block</label>${inp('ssb-'+s.id,s.strobeBlock,'number','50px')}</div>`;
    ssh+=`<div class="edit-row">${saveBtn(`savePut('sirens/${s.id}',[['type','st-${s.id}','int'],['soundAlarm','ssa-${s.id}','int'],['soundSquawk','ssq-${s.id}','int'],['strobe','sst-${s.id}','int'],['strobeBlock','ssb-${s.id}','int']])`)}</div>`;
    ssh+=`</div></td></tr>`;
  });
  if(!sirens.length)ssh+='<tr><td class="dim">No sirens</td></tr>';
  sec('#sirens','Sirens',ssh+'</table>',false);

  // ========== FOLLOW ME ==========
  const fm = await api('followme');
  let fmh='<table>';
  fm.forEach(f=>{
    const ev=f.events,tags=[];
    if(ev.alarm)tags.push(tag('ALM','err'));if(ev.fire)tags.push(tag('FIRE','err'));if(ev.panic)tags.push(tag('PNC','err'));
    if(ev.emergency)tags.push(tag('EMG','err'));if(ev.open)tags.push(tag('OPN','warn'));if(ev.arm)tags.push(tag('ARM','info'));
    if(ev.disarm)tags.push(tag('DARM','ok'));if(ev.technical)tags.push(tag('TECH','dim'));if(ev.tamper)tags.push(tag('TMP','warn'));if(ev.zoneBattery)tags.push(tag('ZBAT','warn'));
    fmh+=`<tr><td class="tid">${f.id}</td><td class="tname">${f.label}</td>`;
    fmh+=`<td class="dim">${f.phone||'--'} ${f.email||''}</td><td>${tags.join('')}</td>`;
    fmh+=`<td><button class="bgr" onclick="toggleEl('fme-${f.id}')">Edit</button></td></tr>`;
    fmh+=`<tr id="fme-${f.id}" style="display:none"><td colspan="5"><div class="edit-panel"><div class="edit-title">Follow Me ${f.id}</div>`;
    fmh+=`<div class="edit-row"><label>Label</label>${inp('fml-'+f.id,f.label)} <label>Phone</label>${inp('fmp-'+f.id,'')} <label>Email</label>${inp('fme2-'+f.id,'','text','200px')}</div>`;
    fmh+=`<div class="edit-row"><label>Channel</label>${sel('fmc-'+f.id,[['0','None'],['1','Voice'],['2','SMS'],['3','Email']],f.channel)}</div>`;
    fmh+=`<div class="edit-row" style="margin-top:6px">`;
    fmh+=cb('fma-'+f.id,'Alarm',ev.alarm)+cb('fmf-'+f.id,'Fire',ev.fire)+cb('fmpn-'+f.id,'Panic',ev.panic);
    fmh+=cb('fmem-'+f.id,'Emergency',ev.emergency)+cb('fmop-'+f.id,'Open',ev.open)+cb('fmar-'+f.id,'Arm',ev.arm);
    fmh+=cb('fmda-'+f.id,'Disarm',ev.disarm)+cb('fmtc-'+f.id,'Technical',ev.technical)+cb('fmtm-'+f.id,'Tamper',ev.tamper);
    fmh+=cb('fmzb-'+f.id,'Zone Battery',ev.zoneBattery);
    fmh+=`</div>`;
    fmh+=`<div class="edit-row">${saveBtn(`saveFollowMe(${f.id})`)}</div>`;
    fmh+=`</div></td></tr>`;

  sec('#followme','Follow Me',fmh+'</table>',false);

  // ========== MONITORING ==========
  const ms = await api('monitoring');
  let msh='<table>';
  ms.forEach(m=>{
    msh+=`<tr><td class="tid">${m.id}</td><td class="dim">Acct:${m.account} Ph:${m.phone||'--'} IP:${m.ip||'--'}:${m.port} Ch:${m.channel}</td>`;
    msh+=`<td><button class="bgr" onclick="toggleEl('mse-${m.id}')">Edit</button></td></tr>`;
    msh+=`<tr id="mse-${m.id}" style="display:none"><td colspan="3"><div class="edit-panel">`;
    msh+=`<div class="edit-row"><label>Account</label>${inp('msa-'+m.id,'')} <label>Phone</label>${inp('msp-'+m.id,'')}</div>`;
    msh+=`<div class="edit-row"><label>IP</label>${inp('msi-'+m.id,m.ip)} <label>Port</label>${inp('mspt-'+m.id,m.port,'number','60px')} <label>Channel</label>${inp('msc-'+m.id,m.channel,'number','50px')}</div>`;
    msh+=`<div class="edit-row">${saveBtn(`savePut('monitoring/${m.id}',[['account','msa-${m.id}','secret'],['phone','msp-${m.id}','secret'],['ip','msi-${m.id}'],['port','mspt-${m.id}','int'],['channel','msc-${m.id}','int']])`)}</div>`;
    msh+=`</div></td></tr>`;
  });
  sec('#monitoring','Monitoring Stations',msh+'</table>',false);

  // ========== CLOUD ==========
  const cl = await api('cloud');
  sec('#cloud','RiscoCloud',`<div class="c">${kv([
    ['Enabled',cl.enabled?tag('ON','ok'):tag('OFF','dim')],['Server',cl.server],['Port',cl.port],
    ['Arm',cl.armEnabled?'Yes':'No'],['Disarm',cl.disarmEnabled?'Yes':'No'],['Encrypted',cl.encrypted?'Yes':'No'],
  ])}`+editBtn(`toggleEl('cle')`)+
  `<div id="cle" class="edit-panel" style="display:none"><div class="edit-title">Cloud Settings</div>`+
  `<div class="edit-row"><label>Enabled</label>${sel('clen',[['0','No'],['1','Yes']],cl.enabled?1:0)} <label>Server</label>${inp('clsrv',cl.server)} <label>Port</label>${inp('clpt',cl.port,'number','60px')}</div>`+
  `<div class="edit-row"><label>Password</label>${inp('clpw','','password')} <label>Arm</label>${sel('clar',[['0','No'],['1','Yes']],cl.armEnabled?1:0)} <label>Disarm</label>${sel('clda',[['0','No'],['1','Yes']],cl.disarmEnabled?1:0)}</div>`+
  `<div class="edit-row">${saveBtn("savePut('cloud',[['enabled','clen','int'],['server','clsrv'],['port','clpt','int'],['password','clpw','secret'],['armEnabled','clar','int'],['disarmEnabled','clda','int']])")}</div>`+
  `</div></div>`,false);

  // ========== GSM ==========
  const gsm = await api('gsm');
  const sig=gsm.signal||{};
  const health=gsm.health||{};
  const st=gsm.statusFlags||{};
  sec('#gsm-sec','GSM Module','<div class="g3">'+
    `<div class="c"><div class="name">Signal ${bars(sig.rssi,31)}</div>`+
    `<div style="font-size:18px;font-weight:700;color:${sig.bars>=3?'#22c55e':sig.bars>=2?'#eab308':'#ef4444'};margin:4px 0">${sig.quality||'?'}</div>`+
    `<div class="dim">${sig.rssi}/31 (${sig.dbm} dBm)</div></div>`+
    `<div class="c">${kv([['IMEI',gsm.imei],['SIM',gsm.simSerial],['APN',gsm.apn],['Provider',gsm.provider||'--']])}`+
    editBtn(`toggleEl('gsme')`)+
    `<div id="gsme" class="edit-panel" style="display:none">`+
    `<div class="edit-row"><label>APN</label>${inp('gapn',gsm.apn)} <label>Provider</label>${inp('gprov',gsm.provider)}</div>`+
    `<div class="edit-row"><label>SIM PIN</label>${inp('gspin','','password','80px')}</div>`+
    `<div class="edit-row">${saveBtn("savePut('gsm',[['apn','gapn'],['provider','gprov'],['simPin','gspin','secret']])")}</div>`+
    `</div></div>`+
    `<div class="c">${kv([['State',health.summary||gsm.status],['Registered',st.registered?tag('YES','ok'):tag('NO','err')],['GPRS',st.gprsAttached?tag('YES','ok'):tag('NO','err')],['SIM',st.simInserted?tag('YES','ok'):tag('NO','err')],['Net Loss',gsm.networkLoss+'min']])}</div>`+
  '</div>',false);

  // ========== NETWORK ==========
  const net = await api('network');
  sec('#network','Network',`<div class="c">${kv([['IP',net.ip],['Subnet',net.subnet],['Gateway',net.gateway],['MAC',net.mac],['DNS',net.dns||'--'],['NetBIOS',net.netbios]])}`+
  editBtn(`toggleEl('nete')`)+
  `<div id="nete" class="edit-panel" style="display:none"><div class="edit-title">Network Settings</div>`+
  `<div class="edit-row"><label>IP</label>${inp('nip',net.ip)} <label>Subnet</label>${inp('nsub',net.subnet)} <label>Gateway</label>${inp('ngw',net.gateway)}</div>`+
  `<div class="edit-row"><label>DNS</label>${inp('ndns',net.dns)} <label>NetBIOS</label>${inp('nnb',net.netbios)}</div>`+
  `<div class="edit-row">${saveBtn("savePut('network',[['ip','nip'],['subnet','nsub'],['gateway','ngw'],['dns','ndns'],['netbios','nnb']])")}</div>`+
  `</div></div>`,false);

  // ========== ARMING CONFIG ==========
  const arm = await api('arming-config');
  sec('#arming','Arming Config',`<div class="c">${kv([
    ['Entry Delay',arm.entryDelay+'s'],['Exit Delay',arm.exitDelay+'s'],['Bell Timeout',arm.bellTimeout+'m'],
    ['Swinger',arm.swingerShutdown],['Quick Arm',arm.quickArm?'Yes':'No'],['Bypass Always',arm.bypassAlways?'Yes':'No'],
  ])}`+editBtn(`toggleEl('arme')`)+
  `<div id="arme" class="edit-panel" style="display:none"><div class="edit-title">Arming Settings</div>`+
  `<div class="edit-row"><label>Entry Delay (s)</label>${inp('aed',arm.entryDelay,'number','60px')} <label>Exit Delay (s)</label>${inp('axd',arm.exitDelay,'number','60px')} <label>Bell Timeout (m)</label>${inp('abt',arm.bellTimeout,'number','60px')}</div>`+
  `<div class="edit-row"><label>Bell Delay (s)</label>${inp('abd',arm.bellDelay,'number','60px')} <label>Swinger</label>${inp('asw',arm.swingerShutdown,'number','60px')} <label>AC Delay (s)</label>${inp('aac',arm.acDelay||0,'number','60px')}</div>`+
  `<div class="edit-row">` +
  cb('aqarm','Quick Arm',arm.quickArm)+cb('aqbyp','Quick Bypass',arm.quickBypass)+cb('abya','Bypass Always',arm.bypassAlways)+
  cb('aexr','Exit Restrict',arm.exitRestrict)+cb('awrn','Warn Arm',arm.warnBeforeArm)+cb('asil','Silent Install',arm.silentInstall)+
  `</div>`+
  `<div class="edit-row">${saveBtn("saveArmConfig()")}</div>`+
  `</div></div>`,false);

  // ========== SCHEDULES ==========
  const scheds = await api('schedules');
  let sch='<table>';
  scheds.forEach(s=>{
    sch+=`<tr><td class="tid">${s.id}</td><td class="tname">${s.label}</td><td>${s.enabled?tag('ON','ok'):tag('OFF','dim')}</td><td class="dim">Type:${s.type}</td>`;
    sch+=`<td><button class="bgr" onclick="toggleEl('sce-${s.id}')">Edit</button></td></tr>`;
    sch+=`<tr id="sce-${s.id}" style="display:none"><td colspan="5"><div class="edit-panel">`;
    sch+=`<div class="edit-row"><label>Label</label>${inp('scl-'+s.id,s.label)} <label>Type</label>${inp('sct-'+s.id,s.type,'number','50px')} <label>Enabled</label>${sel('sce2-'+s.id,[['0','No'],['1','Yes']],s.enabled?1:0)}</div>`;
    sch+=`<div class="edit-row">${saveBtn(`savePut('schedules/${s.id}',[['label','scl-${s.id}'],['type','sct-${s.id}','int'],['enabled','sce2-${s.id}','int']])`)}</div>`;
    sch+=`</div></td></tr>`;
  });
  sec('#schedules','Schedules',sch+'</table>',false);

  // ========== VACATIONS ==========
  const vacs = await api('vacations');
  let vh='<table>';
  vacs.forEach(v=>{
    vh+=`<tr><td class="tid">${v.id}</td><td class="tname">${v.label||'Vacation'}</td><td>${v.enabled?tag('ON','ok'):tag('OFF','dim')}</td><td class="dim">${v.start} - ${v.end}</td>`;
    vh+=`<td><button class="bgr" onclick="toggleEl('ve-${v.id}')">Edit</button></td></tr>`;
    vh+=`<tr id="ve-${v.id}" style="display:none"><td colspan="5"><div class="edit-panel">`;
    vh+=`<div class="edit-row"><label>Enabled</label>${sel('ven-'+v.id,[['0','No'],['1','Yes']],v.enabled?1:0)} <label>Label</label>${inp('vlb-'+v.id,v.label)}</div>`;
    vh+=`<div class="edit-row">${saveBtn(`savePut('vacations/${v.id}',[['enabled','ven-${v.id}','int'],['label','vlb-${v.id}']])`)}</div>`;
    vh+=`</div></td></tr>`;
  });
  if(!vacs.length)vh+='<tr><td class="dim" colspan="5">None</td></tr>';
  sec('#vacations','Vacations',vh+'</table>',false);

  // ========== EVENTS ==========
  const evts = await api('events');
  let eh='<div style="max-height:200px;overflow:auto;font-family:monospace;font-size:11px">';
  evts.forEach(e=>{eh+=`<div style="padding:2px 0;border-bottom:1px solid #1a2236;color:#64748b">${e.raw}</div>`});
  if(!evts.length)eh+='<div class="dim">No events</div>';
  sec('#events','Events ('+evts.length+')',eh+'</div>',false);

  // ========== FIRMWARE ==========
  const fw = await api('firmware');
  sec('#firmware','Firmware',`<div class="c dim">${fw.server} / ${fw.file}:${fw.port}</div>`,false);

  // ========== ACTIONS ==========
  sec('#actions','System Actions',`<div class="row" style="padding:8px 0;gap:8px">`+
    `<button class="bb" onclick="doAction('rf-test')">Start RF Test</button>`+
    `<button class="bgr" onclick="doAction('rf-test/stop')">Stop RF Test</button>`+
    `<button class="by" onclick="doAction('reset-tech')">Reset Tech Troubles</button>`+
  `</div>`,false);

  // ========== COMMAND CATALOG ==========
  await loadCommandCatalog();

  // ========== RAW ==========
  sec('#raw','Raw Command',`<div class="raw-row"><input id="cmd" placeholder="Z2WPRSNS9? or CLOCK?"><button class="bb" onclick="rawCmd(false)">SEND</button><button class="by" onclick="rawCmd(true)">PROG</button></div><pre id="rawout"></pre>`);
}

let COMMAND_MENU = null;
let CMD_CATEGORY = '';
let CMD_BASE = '';

async function loadCommandCatalog() {
  try {
    COMMAND_MENU = await api('commands/menu');
    CMD_CATEGORY = (COMMAND_MENU.categories && COMMAND_MENU.categories[0] && COMMAND_MENU.categories[0].name) || '';
    sec('#cmdcatalog','Commands',`<div class="cmd-tools">`+
      `<input id="cmd-q" placeholder="Search menu" oninput="renderCommandMenu()">`+
      `<select id="cmd-support" onchange="renderCommandMenu()"><option value="">All support</option><option value="supported">Supported</option><option value="unsupported">Unsupported</option><option value="unknown">Unknown</option><option value="readable">Readable</option></select>`+
      `<select id="cmd-kind" onchange="renderCommandMenu()"><option value="">All kinds</option><option value="setting">Setting</option><option value="status">Status</option><option value="sensitive">Sensitive</option><option value="action">Action</option><option value="write">Write</option><option value="unknown">Unknown</option></select>`+
      `<button class="bgr" onclick="clearCommandMenuFilters()">Clear</button>`+
      `</div><div id="cmd-stats" class="cmd-stats"></div><div class="cmd-menu"><div id="cmd-cats" class="cmd-pane"></div><div id="cmd-bases" class="cmd-pane"></div><div id="cmd-detail" class="cmd-detail"></div></div><pre id="cmd-readout"></pre>`,false);
    renderCommandMenu();
  } catch(e) {
    sec('#cmdcatalog','Commands',`<div class="c dim">Catalog unavailable: ${esc(e.message)}</div>`,false);
  }
}

function clearCommandMenuFilters() {
  $('#cmd-q').value = '';
  $('#cmd-support').value = '';
  $('#cmd-kind').value = '';
  renderCommandMenu();
}

function commandMatchesMenu(c) {
  const q = ($('#cmd-q')?.value || '').trim().toUpperCase();
  const support = $('#cmd-support')?.value || '';
  const kind = $('#cmd-kind')?.value || '';
  if (q && !(c.command.includes(q) || c.base.includes(q) || c.category.toUpperCase().includes(q) || (c.description || '').toUpperCase().includes(q))) return false;
  if (kind && c.kind !== kind) return false;
  if (support === 'supported' && c.support !== true) return false;
  if (support === 'unsupported' && c.support !== false) return false;
  if (support === 'unknown' && c.support !== null) return false;
  if (support === 'readable' && !c.readable) return false;
  return true;
}

function filteredCommandMenu() {
  return (COMMAND_MENU.categories || []).map(cat => {
    const bases = cat.bases.map(base => {
      const commands = base.commands.filter(commandMatchesMenu);
      return {...base, commands, count: commands.length};
    }).filter(base => base.commands.length);
    const count = bases.reduce((n, base) => n + base.commands.length, 0);
    return {...cat, bases, count, baseCount: bases.length};
  }).filter(cat => cat.bases.length);
}

function selectCommandCategory(name) {
  CMD_CATEGORY = name;
  CMD_BASE = '';
  renderCommandMenu();
}

function selectCommandBase(base) {
  CMD_BASE = base;
  renderCommandMenu();
}

function commandBadges(c) {
  const sup = c.support === true ? tag('OK','ok') : c.support === false ? tag('N/A','dim') : tag('UNK','warn');
  const mode = c.sensitive ? tag('SECRET','warn') : c.action ? tag('ACTION','err') : c.readable ? tag('READ','info') : tag((c.kind || 'CMD').toUpperCase(),'dim');
  return sup + mode;
}

function renderCommandMenu() {
  if (!COMMAND_MENU) return;
  const cats = filteredCommandMenu();
  if (!cats.length) {
    $('#cmd-stats').textContent = `0/${COMMAND_MENU.meta.commandCount} commands`;
    $('#cmd-cats').innerHTML = '<div class="cmd-tab"><span class="dim">No groups</span></div>';
    $('#cmd-bases').innerHTML = '';
    $('#cmd-detail').innerHTML = '';
    return;
  }
  if (!cats.some(c => c.name === CMD_CATEGORY)) CMD_CATEGORY = cats[0].name;
  const cat = cats.find(c => c.name === CMD_CATEGORY);
  if (!CMD_BASE || !cat.bases.some(b => b.base === CMD_BASE)) CMD_BASE = cat.bases[0].base;
  const base = cat.bases.find(b => b.base === CMD_BASE);
  const total = cats.reduce((n, c) => n + c.count, 0);
  const baseTotal = cats.reduce((n, c) => n + c.baseCount, 0);

  $('#cmd-stats').textContent = `${total}/${COMMAND_MENU.meta.commandCount} commands | ${baseTotal} families | ${COMMAND_MENU.meta.liveSupportedCount} live-supported`;
  $('#cmd-cats').innerHTML = cats.map(c => `<div class="cmd-tab ${c.name===CMD_CATEGORY?'sel':''}" onclick="selectCommandCategory('${esc(c.name)}')"><span>${esc(c.name)}</span><span class="cmd-count">${c.baseCount} / ${c.count}</span></div>`).join('');
  $('#cmd-bases').innerHTML = cat.bases.map(b => `<div class="cmd-tab ${b.base===CMD_BASE?'sel':''}" onclick="selectCommandBase('${esc(b.base)}')"><span class="cmd-name">${esc(b.base)}</span><span class="cmd-count">${b.commands.length}</span></div>`).join('');

  const rows = base.commands.slice(0, 500);
  $('#cmd-detail').innerHTML = `<div class="cmd-detail-head"><div class="cmd-detail-title">${esc(base.base)}</div><div class="cmd-meta">${esc(cat.name)} | ${base.commands.length} command variants | ${base.readableCount} readable | ${base.actionCount} actions | ${base.sensitiveCount} sensitive</div></div>`+
    `<div class="cmd-list">`+
    (rows.map(c => {
      const meta = [c.traffic, c.valueType, c.legality, c.format].filter(Boolean).join(' | ');
      return `<div class="cmd-row">`+
        `<div class="cmd-name">${esc(c.command)}</div>`+
        `<div>${commandBadges(c)}</div>`+
        `<div><div class="cmd-meta">${esc(c.inheritedFrom ? 'inherits '+c.inheritedFrom : c.source)}</div><div class="cmd-meta">${esc(meta || c.description || c.source)}</div></div>`+
        `<div class="cmd-actions"><button class="bgr" onclick="fillCatalogCommand('${esc(c.command)}')">Raw</button>${c.readable?`<button class="bb" onclick="readCatalogCommand('${esc(c.command)}')">Read</button>`:''}</div>`+
        `</div>`;
    }).join('') || '<div class="cmd-row"><div class="dim">No commands</div></div>')+
    (base.commands.length > rows.length ? `<div class="cmd-row"><div class="dim">${base.commands.length - rows.length} more hidden by view limit</div></div>` : '')+
    `</div>`;
}

function fillCatalogCommand(command) {
  const input = document.getElementById('cmd');
  if (input) {
    input.value = command + '?';
    input.focus();
  }
}

async function readCatalogCommand(command) {
  const r = await post('commands/read', { command });
  $('#cmd-readout').textContent = JSON.stringify(r, null, 2);
}

// Settings panel
async function showSettings() {
  const ov = $('#settings-overlay');
  ov.style.display = 'flex';
  $('#cfg-status').textContent = '';
  try {
    const cfg = await api('config');
    $('#cfg-ip').value = cfg.panelIp || '';
    $('#cfg-port').value = cfg.panelPort || '';
    $('#cfg-pass').value = '';
    $('#cfg-pass').placeholder = cfg.panelPasswordSet ? 'saved' : 'not set';
    $('#cfg-id').value = cfg.panelId || '';
    const sel = $('#cfg-type');
    sel.innerHTML = (cfg.supportedPanelTypes || ['LightSys']).map(t =>
      `<option value="${t}"${t === cfg.panelType ? ' selected' : ''}>${t}</option>`
    ).join('');
  } catch(e) {
    $('#cfg-status').innerHTML = '<span style="color:#f87171">Could not load config: ' + e.message + '</span>';
  }
}
function hideSettings() { $('#settings-overlay').style.display = 'none'; }
async function saveSettings() {
  const btn = $('#cfg-save-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  $('#cfg-status').innerHTML = '<span style="color:#64748b">Saving and reconnecting to panel...</span>';
  try {
    const body = {
      panelIp: $('#cfg-ip').value,
      panelPort: parseInt($('#cfg-port').value) || 1000,
      panelId: $('#cfg-id').value,
      panelType: $('#cfg-type').value,
    };
    if ($('#cfg-pass').value) body.panelPassword = parseInt($('#cfg-pass').value);
    await put('config', body);
    $('#cfg-status').innerHTML = '<span style="color:#6ee7a0">Saved! Reconnecting to panel...</span>';
    // Wait a bit then reload to pick up new connection
    setTimeout(() => { hideSettings(); location.reload(); }, 3000);
  } catch(e) {
    $('#cfg-status').innerHTML = '<span style="color:#f87171">Failed: ' + e.message + '</span>';
    btn.disabled = false;
    btn.textContent = 'Save & Reconnect';
  }
}
// Close settings on overlay click
document.getElementById('settings-overlay').addEventListener('click', function(e) {
  if (e.target === this) hideSettings();
});

// Boot: check if we have a server URL, otherwise show connect screen
(async () => {
  BASE = getBase();
  if (BASE === null) {
    // No saved server and not served locally — show connect dialog
    $('#connect').style.display = 'block';
    // Pre-fill with common local addresses
    $('#server-url').value = 'http://localhost:3580';
    return;
  }
  try { await load(); } catch(e) {
    // If saved server fails, show connect dialog
    localStorage.removeItem('risco-server');
    $('#connect').style.display = 'block';
    $('#server-url').value = BASE || 'http://localhost:3580';
    $('#connect-err').textContent = 'Lost connection: ' + e.message;
  }
})();
